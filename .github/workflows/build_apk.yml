name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.5'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK (debug)
        run: flutter build apk --debug
      
      - name: Rename APK with version
        run: |
          cp build/app/outputs/flutter-apk/app-debug.apk ai-toolbox-v3.2.1.apk
      
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-toolbox-apk
          path: ai-toolbox-v3.2.1.apk
          compression-level: 0
          retention-days: 30
