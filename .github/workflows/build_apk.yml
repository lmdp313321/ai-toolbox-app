name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.5'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK (release - small size)
        run: flutter build apk --release --split-per-abi
      
      - name: Show APK sizes
        run: |
          ls -lh build/app/outputs/flutter-apk/
          echo "---"
          # 选一个最小的上传
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk ai-toolbox-release.apk 2>/dev/null || \
          cp build/app/outputs/flutter-apk/app-release.apk ai-toolbox-release.apk 2>/dev/null || true
      
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.2.1
          name: "AI工具箱 v3.2.1"
          body: |
            ## AI工具箱 v3.2.1
            
            56个实用工具，含AI智能、日常助手、开发工具、实用工具四大板块
            
            **安装**: 下载APK到手机直接安装
            **配置**: 首次使用需在设置页配置API Key
          files: ai-toolbox-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
