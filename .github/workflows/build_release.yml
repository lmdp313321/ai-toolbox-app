name: Build Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.5'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      
      - name: Build release APK (split-per-abi)
        run: flutter build apk --release --split-per-abi --no-tree-shake-icons
      
      - name: Upload ARM64 APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-toolbox-release-arm64
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          compression-level: 0
          retention-days: 30
      
      - name: Upload ARM32 APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-toolbox-release-armeabi
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          compression-level: 0
          retention-days: 30
      
      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-toolbox-release-x86_64
          path: build/app/outputs/flutter-apk/app-x86_64-release.apk
          compression-level: 0
          retention-days: 30
